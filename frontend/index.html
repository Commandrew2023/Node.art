<body>
    <div id="tools">
        <div id="navbar">
            <button class="navbar-button" ribbon="Save" onclick="UI.selectRibbon('Save')">Save</button>
            <button class="navbar-button" ribbon="View" onclick="UI.selectRibbon('View')">View</button>
            <button class="navbar-button" ribbon="Draw" onclick="UI.selectRibbon('Draw')">Draw</button>
            <button class="navbar-button" ribbon="Color" onclick="UI.selectRibbon('Color')">Color</button>

                    <div class="ribbon-section-body-wrapper">
                        <div class="ribbon-section-body">
                            
                        </div>
                    </div>
                    <div class="ribbon-section-label-wrapper">
                        <div class="ribbon-section-label">Saving Methods</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="shell">
        <div id="panes"></div>
        <div id="canvas">
            <div class="panel-button" side="left">
                <span class="material-symbols-outlined">arrow_forward</span>
            </div>
            <div class="panel-button" side="right">
                <span class="material-symbols-outlined">arrow_back</span>
            </div>
            <canvas id="draw" tabindex="0"></canvas>
        </div>
        <div id="controller">
            <div id="controller-buttons">
                <button class="controller-button" page="Elements" onclick="UI.selectPanelPage('Elements')">Elements</button>
                <button class="controller-button" page="Anchors" onclick="UI.selectPanelPage('Anchors')">Anchors</button>
                <button class="controller-button" page="Controllers" onclick="UI.selectPanelPage('Controllers')">Controllers</button>
            </div>
            <div id="controller-body">
                <div class="panel-page drag-list" page="Elements">

                        <div class="panel-dropdown-label">

                                drag_indicator

                                Ellipse 1

                        </div>
                        <div class="panel-dropdown-body">
                            <div class="panel-dropdown-field">
                                <label for="uuid">UUID: </label>
